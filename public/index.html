<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Touchpad</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">

  <!-- Sessiecode scherm -->
  <div id="code-screen">
    <div id="code-box">
      <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
        <rect x="12" y="4" width="32" height="48" rx="6" stroke="#7c6ff7" stroke-width="2"/>
        <circle cx="28" cy="44" r="3" fill="#7c6ff7" opacity="0.5"/>
        <rect x="18" y="16" width="20" height="12" rx="3" stroke="#7c6ff7" stroke-width="1.5" opacity="0.4"/>
      </svg>
      <h1>Touchpad</h1>
      <p>Voer de server-URL en sessiecode in die op je laptop staan</p>
      <input type="url" id="server-input" placeholder="https://xyz.trycloudflare.com" autocomplete="off" spellcheck="false" />
      <input type="text" id="code-input" maxlength="10" placeholder="CODE" autocomplete="off" spellcheck="false" />
      <button id="code-btn">Verbinden</button>
      <p id="code-error" class="error-text"></p>
    </div>
  </div>

  <!-- Touchpad scherm (verborgen tot paired) -->
  <div id="touchpad-screen" class="hidden">
    <div id="statusbar">
      <div id="dot" class="connected"></div>
      <span id="status-text">Verbonden</span>
      <span id="session-code"></span>
    </div>

    <div id="touchpad">
      <div id="pad-hint">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect x="14" y="6" width="20" height="28" rx="10" stroke="#7c6ff7" stroke-width="2"/>
          <line x1="24" y1="6" x2="24" y2="34" stroke="#7c6ff7" stroke-width="1.5"/>
          <circle cx="24" cy="42" r="3" fill="#7c6ff7" opacity="0.5"/>
        </svg>
        <span>Sleep met één vinger om te bewegen</span>
        <span>Twee vingers om te scrollen</span>
      </div>
      <div id="scroll-hint">↕ Scrollen</div>
      <div id="scrollbar"></div>
    </div>

    <div id="buttons">
      <button class="btn" id="btn-left">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <rect x="3" y="3" width="14" height="14" rx="3" stroke="var(--text)" stroke-width="1.5"/>
          <line x1="10" y1="3" x2="10" y2="17" stroke="var(--text)" stroke-width="1"/>
        </svg>
        Links klik
      </button>
      <button class="btn" id="btn-double">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <circle cx="7" cy="10" r="3.5" stroke="var(--text)" stroke-width="1.5"/>
          <circle cx="13" cy="10" r="3.5" stroke="var(--text)" stroke-width="1.5"/>
        </svg>
        Dubbelklik
      </button>
      <button class="btn" id="btn-right">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <rect x="3" y="3" width="14" height="14" rx="3" stroke="var(--text)" stroke-width="1.5"/>
          <line x1="10" y1="3" x2="10" y2="17" stroke="var(--text)" stroke-width="1"/>
        </svg>
        Rechts klik
      </button>
    </div>
  </div>

</div>

<script>
  let ws = null;

  const codeScreen = document.getElementById("code-screen");
  const touchpadScreen = document.getElementById("touchpad-screen");
  const serverInput = document.getElementById("server-input");
  const codeInput = document.getElementById("code-input");
  const codeBtn = document.getElementById("code-btn");
  const codeError = document.getElementById("code-error");
  const dot = document.getElementById("dot");
  const statusText = document.getElementById("status-text");
  const sessionCode = document.getElementById("session-code");

  // Herstel opgeslagen server URL
  const savedUrl = localStorage.getItem("touchpad-server-url");
  if (savedUrl) serverInput.value = savedUrl;

  function showError(msg) { codeError.textContent = msg; }

  function connectWithCode() {
    let serverUrl = serverInput.value.trim().replace(/\/+$/, "");
    const code = codeInput.value.trim().toUpperCase();

    if (!serverUrl) { showError("Vul de server-URL in"); return; }
    if (code.length < 4) { showError("Code moet minstens 4 tekens zijn"); return; }

    // HTTP(S) naar WS(S) converteren
    let wsUrl;
    if (serverUrl.startsWith("https://")) {
      wsUrl = "wss://" + serverUrl.slice(8);
    } else if (serverUrl.startsWith("http://")) {
      wsUrl = "ws://" + serverUrl.slice(7);
    } else if (serverUrl.startsWith("wss://") || serverUrl.startsWith("ws://")) {
      wsUrl = serverUrl;
    } else {
      wsUrl = "wss://" + serverUrl;
    }

    localStorage.setItem("touchpad-server-url", serverUrl);
    showError("");
    codeBtn.disabled = true;
    codeBtn.textContent = "Verbinden…";

    ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      ws.send(JSON.stringify({ type: "register", role: "phone", code }));
    };

    ws.onmessage = (e) => {
      let msg;
      try { msg = JSON.parse(e.data); } catch { return; }

      switch (msg.type) {
        case "paired":
          codeScreen.classList.add("hidden");
          touchpadScreen.classList.remove("hidden");
          sessionCode.textContent = code;
          dot.classList.add("connected");
          statusText.textContent = "Verbonden met laptop";
          break;
        case "error":
          showError(msg.message);
          codeBtn.disabled = false;
          codeBtn.textContent = "Verbinden";
          if (ws) ws.close();
          break;
        case "disconnected":
          dot.classList.remove("connected");
          statusText.textContent = "Laptop verbroken — herlaad pagina";
          break;
      }
    };

    ws.onclose = () => {
      if (!touchpadScreen.classList.contains("hidden")) {
        dot.classList.remove("connected");
        statusText.textContent = "Verbinding verbroken";
      } else {
        codeBtn.disabled = false;
        codeBtn.textContent = "Verbinden";
      }
    };

    ws.onerror = () => {
      showError("Kan niet verbinden met server");
      codeBtn.disabled = false;
      codeBtn.textContent = "Verbinden";
    };
  }

  codeBtn.addEventListener("click", () => connectWithCode());
  codeInput.addEventListener("keydown", (e) => { if (e.key === "Enter") connectWithCode(); });
  serverInput.focus();

  function send(data) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(data)); }

  // Touchpad logic
  const pad = document.getElementById("touchpad");
  const scrollbar = document.getElementById("scrollbar");
  let lastX = null, lastY = null, lastX2 = null, lastY2 = null, isScrolling = false;

  function midpoint(t1, t2) { return { x: (t1.clientX + t2.clientX) / 2, y: (t1.clientY + t2.clientY) / 2 }; }

  pad.addEventListener("touchstart", (e) => {
    e.preventDefault(); pad.classList.add("active");
    if (e.touches.length === 1) {
      lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
      isScrolling = false; pad.classList.remove("scroll-mode");
      const ripple = document.createElement("div"); ripple.className = "ripple";
      const rect = pad.getBoundingClientRect();
      ripple.style.left = (e.touches[0].clientX - rect.left) + "px";
      ripple.style.top  = (e.touches[0].clientY - rect.top) + "px";
      pad.appendChild(ripple); ripple.addEventListener("animationend", () => ripple.remove());
    } else if (e.touches.length === 2) {
      isScrolling = true; pad.classList.add("scroll-mode");
      const mid = midpoint(e.touches[0], e.touches[1]); lastX2 = mid.x; lastY2 = mid.y;
    }
  }, { passive: false });

  pad.addEventListener("touchmove", (e) => {
    e.preventDefault();
    if (e.touches.length === 1 && !isScrolling) {
      const dx = e.touches[0].clientX - lastX; const dy = e.touches[0].clientY - lastY;
      send({ type: "move", dx, dy });
      lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
    } else if (e.touches.length === 2 && isScrolling) {
      const mid = midpoint(e.touches[0], e.touches[1]);
      const dy = mid.y - lastY2;
      send({ type: "scroll", dy });
      lastX2 = mid.x; lastY2 = mid.y;
      const pct = Math.min(90, Math.max(10, 50 + dy));
      scrollbar.style.top = pct + "%";
    }
  }, { passive: false });

  pad.addEventListener("touchend", (e) => {
    if (e.touches.length === 0) {
      pad.classList.remove("active", "scroll-mode");
      isScrolling = false;
    }
  });

  document.getElementById("btn-left").addEventListener("click", () => send({ type: "click" }));
  document.getElementById("btn-double").addEventListener("click", () => send({ type: "doubleclick" }));
  document.getElementById("btn-right").addEventListener("click", () => send({ type: "rightclick" }));
</script>
</body>
</html>
