<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Touchpad</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f13; --surface: #1a1a24; --border: #2e2e42;
      --accent: #7c6ff7; --accent-dim: #4a4580;
      --text: #e8e6ff; --text-muted: #6b6880;
      --pad-bg: #141420; --btn-bg: #1e1e2e; --btn-active: #2e2e46;
      --radius: 16px;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden; touch-action: none; -webkit-tap-highlight-color: transparent; user-select: none; }
    #app { display: flex; flex-direction: column; height: 100dvh; padding: 12px; gap: 10px; }
    #statusbar { display: flex; align-items: center; gap: 8px; padding: 10px 14px;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; }
    #dot { width: 8px; height: 8px; border-radius: 50%; background: #e24b4a; flex-shrink: 0; transition: background 0.3s; }
    #dot.connected { background: #63c940; }
    #status-text { flex: 1; color: var(--text-muted); }
    #touchpad { flex: 1; background: var(--pad-bg); border: 1px solid var(--border);
      border-radius: var(--radius); position: relative; touch-action: none;
      transition: border-color 0.15s, background 0.15s; overflow: hidden; }
    #touchpad.active { border-color: var(--accent-dim); background: #161624; }
    #touchpad.scroll-mode { border-color: #4a8bd4; }
    .ripple { position: absolute; width: 48px; height: 48px; border-radius: 50%;
      background: var(--accent); opacity: 0; transform: translate(-50%, -50%) scale(0);
      animation: ripple-anim 0.5s ease-out forwards; pointer-events: none; }
    @keyframes ripple-anim {
      0%   { opacity: 0.35; transform: translate(-50%, -50%) scale(0); }
      100% { opacity: 0;    transform: translate(-50%, -50%) scale(1); }
    }
    #pad-hint { position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 6px; pointer-events: none; transition: opacity 0.4s; }
    #pad-hint svg { opacity: 0.15; }
    #pad-hint span { font-size: 12px; color: var(--text-muted); opacity: 0.5; }
    #touchpad.active #pad-hint { opacity: 0; }
    #scroll-hint { position: absolute; top: 10px; right: 14px; font-size: 11px;
      color: #4a8bd4; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
    #touchpad.scroll-mode #scroll-hint { opacity: 1; }
    #buttons { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .btn { background: var(--btn-bg); border: 1px solid var(--border); border-radius: 12px;
      color: var(--text); font-size: 13px; font-weight: 500; padding: 16px 8px; text-align: center;
      cursor: pointer; transition: background 0.1s, border-color 0.1s, transform 0.08s;
      touch-action: manipulation; display: flex; flex-direction: column; align-items: center;
      gap: 4px; -webkit-tap-highlight-color: transparent; }
    .btn:active, .btn.pressed { background: var(--btn-active); border-color: var(--accent-dim); transform: scale(0.96); }
    .btn svg { opacity: 0.6; }
    #scrollbar { width: 3px; background: var(--accent); position: absolute; right: 4px;
      top: 10%; height: 20%; border-radius: 2px; opacity: 0; transition: opacity 0.2s, top 0.1s; }
    #touchpad.scroll-mode #scrollbar { opacity: 0.6; }
  </style>
</head>
<body>
<div id="app">
  <div id="statusbar">
    <div id="dot"></div>
    <span id="status-text">Verbinden…</span>
  </div>

  <div id="touchpad">
    <div id="pad-hint">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <rect x="14" y="6" width="20" height="28" rx="10" stroke="#7c6ff7" stroke-width="2"/>
        <line x1="24" y1="6" x2="24" y2="34" stroke="#7c6ff7" stroke-width="1.5"/>
        <circle cx="24" cy="42" r="3" fill="#7c6ff7" opacity="0.5"/>
      </svg>
      <span>Sleep met één vinger om te bewegen</span>
      <span>Twee vingers om te scrollen</span>
    </div>
    <div id="scroll-hint">↕ Scrollen</div>
    <div id="scrollbar"></div>
  </div>

  <div id="buttons">
    <button class="btn" id="btn-left">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <rect x="3" y="3" width="14" height="14" rx="3" stroke="var(--text)" stroke-width="1.5"/>
        <line x1="10" y1="3" x2="10" y2="17" stroke="var(--text)" stroke-width="1"/>
      </svg>
      Links klik
    </button>
    <button class="btn" id="btn-double">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <circle cx="7" cy="10" r="3.5" stroke="var(--text)" stroke-width="1.5"/>
        <circle cx="13" cy="10" r="3.5" stroke="var(--text)" stroke-width="1.5"/>
      </svg>
      Dubbelklik
    </button>
    <button class="btn" id="btn-right">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <rect x="3" y="3" width="14" height="14" rx="3" stroke="var(--text)" stroke-width="1.5"/>
        <line x1="10" y1="3" x2="10" y2="17" stroke="var(--text)" stroke-width="1"/>
      </svg>
      Rechts klik
    </button>
  </div>
</div>

<script>
  // Verbindt met de WS server op poort 3000
  const wsPort = 3000;
  const host = location.hostname;
  let ws = null;

  const dot = document.getElementById("dot");
  const statusText = document.getElementById("status-text");

  function connect() {
    ws = new WebSocket(`ws://${host}:${wsPort}`);
    ws.onopen = () => { dot.classList.add("connected"); statusText.textContent = "Verbonden met PC"; };
    ws.onclose = () => { dot.classList.remove("connected"); statusText.textContent = "Verbroken — opnieuw proberen…"; setTimeout(connect, 2000); };
    ws.onerror = () => { statusText.textContent = "Kan niet verbinden"; };
  }

  function send(data) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(data)); }

  connect();

  const pad = document.getElementById("touchpad");
  const scrollbar = document.getElementById("scrollbar");
  let lastX = null, lastY = null, lastX2 = null, lastY2 = null, isScrolling = false;

  function midpoint(t1, t2) { return { x: (t1.clientX + t2.clientX) / 2, y: (t1.clientY + t2.clientY) / 2 }; }

  pad.addEventListener("touchstart", (e) => {
    e.preventDefault(); pad.classList.add("active");
    if (e.touches.length === 1) {
      lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
      isScrolling = false; pad.classList.remove("scroll-mode");
      const ripple = document.createElement("div"); ripple.className = "ripple";
      const rect = pad.getBoundingClientRect();
      ripple.style.left = (e.touches[0].clientX - rect.left) + "px";
      ripple.style.top  = (e.touches[0].clientY - rect.top) + "px";
      pad.appendChild(ripple); ripple.addEventListener("animationend", () => ripple.remove());
    } else if (e.touches.length === 2) {
      isScrolling = true; pad.classList.add("scroll-mode");
      const mid = midpoint(e.touches[0], e.touches[1]); lastX2 = mid.x; lastY2 = mid.y;
    }
  }, { passive: false });

  pad.addEventListener("touchmove", (e) => {
    e.preventDefault();
    if (e.touches.length === 1 && !isScrolling) {
      const dx = e.touches[0].clientX - lastX; const dy = e.touches[0].clientY - lastY;
      lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
      if (Math.abs(dx) > 0.3 || Math.abs(dy) > 0.3) send({ type: "move", dx, dy });
    } else if (e.touches.length === 2 && isScrolling) {
      const mid = midpoint(e.touches[0], e.touches[1]); const dy = mid.y - lastY2; lastY2 = mid.y;
      if (Math.abs(dy) > 0.5) {
        send({ type: "scroll", dy });
        const padH = pad.getBoundingClientRect().height;
        const pct = Math.max(0.05, Math.min(0.85, (mid.y - pad.getBoundingClientRect().top) / padH));
        scrollbar.style.top = (pct * 100) + "%";
      }
    }
  }, { passive: false });

  pad.addEventListener("touchend", (e) => {
    e.preventDefault();
    if (e.touches.length === 0) { pad.classList.remove("active", "scroll-mode"); isScrolling = false; lastX = lastY = lastX2 = lastY2 = null; }
    else if (e.touches.length === 1) { isScrolling = false; pad.classList.remove("scroll-mode"); lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; }
  }, { passive: false });

  function setupBtn(id, msg) {
    const btn = document.getElementById(id);
    btn.addEventListener("touchstart", (e) => { e.preventDefault(); btn.classList.add("pressed"); send(msg); });
    btn.addEventListener("touchend", (e) => { e.preventDefault(); btn.classList.remove("pressed"); });
  }

  setupBtn("btn-left",   { type: "click" });
  setupBtn("btn-double", { type: "doubleclick" });
  setupBtn("btn-right",  { type: "rightclick" });
</script>
</body>
</html>
